<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳洁618抽奖 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0AB4C8 0%, #067A8A 100%);
            min-height: 100vh;
            color: #1A3A40;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .header h1 {
            font-size: 24px;
            color: #0AB4C8;
        }
        .logout-btn {
            background: #FF8C00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .login-box h2 {
            text-align: center;
            color: #0AB4C8;
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #E8F8FA;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF8C00, #FF6B00);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #0AB4C8;
        }
        .stat-card.prize-1 .value { color: #FFD700; }
        .stat-card.prize-2 .value { color: #FF8C00; }
        .stat-card.prize-3 .value { color: #0AB4C8; }
        .stat-card .percentage {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        .records-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .records-header h2 {
            font-size: 20px;
            color: #0AB4C8;
        }
        .export-btn {
            background: #0AB4C8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #E8F8FA;
        }
        th {
            background: #E8F8FA;
            font-weight: bold;
            color: #0AB4C8;
        }
        tr:hover {
            background: #F8F8F8;
        }
        .prize-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        .prize-badge.level-1 { background: #FFD700; }
        .prize-badge.level-2 { background: #FF8C00; }
        .prize-badge.level-3 { background: #0AB4C8; }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #0AB4C8;
            background: white;
            color: #0AB4C8;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button.active {
            background: #0AB4C8;
            color: white;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginView">
        <div class="login-box">
            <h2>🔐 管理后台登录</h2>
            <input type="password" id="passwordInput" placeholder="请输入管理密码">
            <button onclick="login()">登录</button>
        </div>
    </div>
    
    <!-- 管理界面 -->
    <div id="adminView" class="hidden">
        <div class="container">
            <div class="header">
                <h1>📊 澳洁618抽奖管理后台</h1>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
            
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>总抽奖次数</h3>
                    <div class="value" id="totalDraws">0</div>
                </div>
                <div class="stat-card prize-1">
                    <h3>🏆 一等奖</h3>
                    <div class="value" id="prize1Count">0</div>
                    <div class="percentage" id="prize1Percent">0%</div>
                </div>
                <div class="stat-card prize-2">
                    <h3>🎫 二等奖</h3>
                    <div class="value" id="prize2Count">0</div>
                    <div class="percentage" id="prize2Percent">0%</div>
                </div>
                <div class="stat-card prize-3">
                    <h3>🎟️ 三等奖</h3>
                    <div class="value" id="prize3Count">0</div>
                    <div class="percentage" id="prize3Percent">0%</div>
                </div>
            </div>
            
            <!-- 记录列表 -->
            <div class="records-section">
                <div class="records-header">
                    <h2>抽奖记录</h2>
                    <button class="export-btn" onclick="exportExcel()">📥 导出Excel</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>姓名</th>
                            <th>手机号</th>
                            <th>IP地址</th>
                            <th>奖项</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                    </tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
    
    <script src="js/admin.js"></script>
</body>
</html>
